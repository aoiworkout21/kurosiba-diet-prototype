<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黒柴ダイエット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f0; display: flex; justify-content: center; }
.app { width: 100%; max-width: 390px; min-height: 100vh; background: white; display: flex; flex-direction: column; }

/* SCREENS */
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ONBOARDING */
.onboard { padding: 40px 24px; flex: 1; display: flex; flex-direction: column; gap: 20px; }
.onboard h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; }
.onboard p { font-size: 16px; color: #666; line-height: 1.6; }
.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-group label { font-size: 14px; font-weight: 500; color: #333; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input[type="number"], select {
  width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0;
  border-radius: 12px; font-size: 16px; background: #fafafa;
  color: #1a1a1a; outline: none;
}
input[type="number"]:focus, select:focus { border-color: #1D9E75; }
.btn-main {
  background: #1D9E75; color: white; border: none;
  border-radius: 16px; padding: 16px; font-size: 17px;
  font-weight: 600; cursor: pointer; margin-top: auto;
}

/* HOME */
.home-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
.app-name { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.streak { background: #FFF3E0; color: #E65100; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }

.dog-area { display: flex; flex-direction: column; align-items: center; padding: 24px 24px 16px; }
.dog-img { width: 180px; height: 180px; object-fit: contain; transition: all 0.3s; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-16px)} }
.dog-img.bounce { animation: bounce 0.6s ease; }
.dog-name { font-size: 20px; font-weight: 700; color: #1a1a1a; margin-top: 8px; }
.dog-message { font-size: 14px; color: #666; margin-top: 4px; text-align: center; padding: 0 24px; }

.stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 16px 16px; }
.stat { background: #f8f8f6; border-radius: 12px; padding: 12px; text-align: center; }
.stat-label { font-size: 11px; color: #999; margin-bottom: 4px; }
.stat-value { font-size: 18px; font-weight: 700; color: #1a1a1a; }

.balance-bar { margin: 0 16px 20px; padding: 14px 16px; border-radius: 16px; background: #E8F5E9; }
.balance-label { font-size: 13px; color: #388E3C; font-weight: 500; margin-bottom: 4px; }
.balance-value { font-size: 20px; font-weight: 700; color: #1D9E75; }

.action-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 0 16px; margin-bottom: 16px; }
.action-btn { background: #f8f8f6; border: none; border-radius: 16px; padding: 16px 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; }
.action-btn:active { transform: scale(0.96); }
.action-icon { font-size: 28px; }
.action-label { font-size: 12px; font-weight: 600; color: #333; }

/* FOOD SCREEN */
.screen-header { padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #f0f0f0; }
.back-btn { background: none; border: none; font-size: 24px; cursor: pointer; color: #333; }
.screen-title { font-size: 18px; font-weight: 700; color: #1a1a1a; }

.upload-area { margin: 24px 16px; border: 2px dashed #ccc; border-radius: 20px; padding: 48px 24px; text-align: center; cursor: pointer; background: #fafafa; position: relative; overflow: hidden; }
.upload-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
.upload-icon { font-size: 48px; margin-bottom: 12px; }
.upload-text { font-size: 16px; color: #666; }
.upload-sub { font-size: 13px; color: #999; margin-top: 4px; }

.analyzing { display: none; text-align: center; padding: 32px 24px; }
.analyzing.visible { display: block; }
.analyzing-dog { width: 80px; height: 80px; object-fit: contain; animation: bounce 0.8s infinite; margin: 0 auto 12px; }
.analyzing-text { font-size: 15px; color: #666; }

.result { display: none; padding: 0 16px; }
.result.visible { display: block; }
.result-card { background: #f8f8f6; border-radius: 20px; padding: 20px; margin-bottom: 12px; }
.result-food { font-size: 18px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.result-cal { font-size: 40px; font-weight: 700; color: #1D9E75; }
.result-unit { font-size: 16px; color: #999; }
.nutrition { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 16px; }
.nutrition-item { text-align: center; }
.nutrition-label { font-size: 11px; color: #999; }
.nutrition-value { font-size: 15px; font-weight: 600; color: #333; }

.dog-reaction { display: flex; align-items: center; gap: 12px; padding: 16px; background: #E8F5E9; border-radius: 16px; margin-bottom: 16px; }
.reaction-dog { width: 60px; height: 60px; object-fit: contain; }
.reaction-text { font-size: 14px; color: #2E7D32; font-weight: 500; }

/* WEIGHT & EXERCISE */
.input-screen { padding: 24px 16px; flex: 1; display: flex; flex-direction: column; gap: 20px; }
.big-input { width: 100%; padding: 20px; border: 2px solid #e0e0e0; border-radius: 16px; font-size: 32px; font-weight: 700; text-align: center; color: #1a1a1a; background: #fafafa; outline: none; }
.big-input:focus { border-color: #1D9E75; }
.unit-label { text-align: center; font-size: 16px; color: #999; margin-top: -12px; }

.exercise-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.ex-btn { background: #f8f8f6; border: 2px solid transparent; border-radius: 12px; padding: 16px; text-align: center; cursor: pointer; font-size: 14px; font-weight: 600; color: #333; }
.ex-btn.selected { border-color: #1D9E75; background: #E8F5E9; color: #1D9E75; }

/* BOTTOM NAV */
.bottom-nav { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-top: 1px solid #f0f0f0; background: white; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { display: flex; flex-direction: column; align-items: center; padding: 10px; background: none; border: none; cursor: pointer; gap: 4px; }
.nav-icon { font-size: 24px; }
.nav-label { font-size: 10px; color: #999; font-weight: 500; }
.nav-btn.active .nav-label { color: #1D9E75; }
</style>
</head>
<body>
<div class="app">

<!-- ONBOARDING -->
<div class="screen active" id="screen-onboard">
  <div class="onboard">
    <div>
      <h1>🐕 黒柴ダイエット</h1>
      <p style="margin-top:8px;">クロと一緒に、月1kgずつ痩せよう。</p>
    </div>
    <div class="input-group">
      <label>性別</label>
      <select id="input-gender">
        <option value="female">女性</option>
        <option value="male">男性</option>
      </select>
    </div>
    <div class="input-row">
      <div class="input-group">
        <label>年齢</label>
        <input type="number" id="input-age" placeholder="29" min="10" max="99">
      </div>
      <div class="input-group">
        <label>身長 (cm)</label>
        <input type="number" id="input-height" placeholder="158" min="100" max="220">
      </div>
    </div>
    <div class="input-group">
      <label>体重 (kg)</label>
      <input type="number" id="input-weight" placeholder="58" min="30" max="200" step="0.1">
    </div>
    <button class="btn-main" onclick="startApp()">クロとはじめる 🐾</button>
  </div>
</div>

<!-- HOME -->
<div class="screen" id="screen-home">
  <div class="home-header">
    <span class="app-name">黒柴ダイエット</span>
    <span class="streak" id="streak-badge">1日目</span>
  </div>
  <div class="dog-area">
    <img class="dog-img" id="dog-img" src="" alt="クロ">
    <div class="dog-name">クロ</div>
    <div class="dog-message" id="dog-message">今日も一緒に頑張ろう！</div>
  </div>
  <div class="stats">
    <div class="stat">
      <div class="stat-label">食事</div>
      <div class="stat-value" id="stat-food">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">歩数</div>
      <div class="stat-value" id="stat-steps">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">体重</div>
      <div class="stat-value" id="stat-weight">--</div>
    </div>
  </div>
  <div class="balance-bar" id="balance-bar">
    <div class="balance-label">今日の収支</div>
    <div class="balance-value" id="balance-value">記録してみよう</div>
  </div>
  <div class="action-btns">
    <button class="action-btn" onclick="showScreen('food')">
      <span class="action-icon">🍱</span>
      <span class="action-label">食事</span>
    </button>
    <button class="action-btn" onclick="showScreen('weight')">
      <span class="action-icon">⚖️</span>
      <span class="action-label">体重</span>
    </button>
    <button class="action-btn" onclick="showScreen('exercise')">
      <span class="action-icon">🏃</span>
      <span class="action-label">運動</span>
    </button>
  </div>
</div>

<!-- FOOD -->
<div class="screen" id="screen-food">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <span class="screen-title">食事を記録する</span>
  </div>
  <div class="upload-area" id="upload-area">
    <input type="file" accept="image/*" capture="environment" onchange="analyzeFood(this)">
    <div class="upload-icon">📷</div>
    <div class="upload-text">写真を撮る</div>
    <div class="upload-sub">AIがカロリーを計算します</div>
  </div>
  <div class="analyzing" id="analyzing">
    <img class="analyzing-dog" id="analyzing-dog" src="" alt="クロ">
    <div class="analyzing-text">クロが匂いを嗅いで計算中...</div>
  </div>
  <div class="result" id="food-result">
    <div class="result-card">
      <div class="result-food" id="result-food-name"></div>
      <div><span class="result-cal" id="result-cal"></span><span class="result-unit"> kcal</span></div>
      <div class="nutrition">
        <div class="nutrition-item"><div class="nutrition-label">タンパク質</div><div class="nutrition-value" id="result-protein"></div></div>
        <div class="nutrition-item"><div class="nutrition-label">脂質</div><div class="nutrition-value" id="result-fat"></div></div>
        <div class="nutrition-item"><div class="nutrition-label">炭水化物</div><div class="nutrition-value" id="result-carb"></div></div>
      </div>
    </div>
    <div class="dog-reaction">
      <img class="reaction-dog" id="reaction-dog" src="" alt="クロ">
      <div class="reaction-text" id="reaction-text"></div>
    </div>
    <button class="btn-main" onclick="recordFood()">記録する</button>
  </div>
</div>

<!-- WEIGHT -->
<div class="screen" id="screen-weight">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <span class="screen-title">体重を記録する</span>
  </div>
  <div class="input-screen">
    <div style="text-align:center;font-size:60px;margin:20px 0;">⚖️</div>
    <input type="number" class="big-input" id="weight-input" placeholder="58.0" step="0.1">
    <div class="unit-label">kg</div>
    <div style="margin-top:auto;">
      <button class="btn-main" onclick="recordWeight()">記録する</button>
    </div>
  </div>
</div>

<!-- EXERCISE -->
<div class="screen" id="screen-exercise">
  <div class="screen-header">
    <button class="back-btn" onclick="showScreen('home')">←</button>
    <span class="screen-title">運動を記録する</span>
  </div>
  <div class="input-screen">
    <div style="text-align:center;font-size:14px;color:#666;margin-bottom:8px;">今日やった運動を選んでください</div>
    <div class="exercise-btns">
      <button class="ex-btn" onclick="selectExercise(this, 150)">🚶 ウォーキング30分<br><span style="color:#1D9E75;font-size:12px;">約150kcal</span></button>
      <button class="ex-btn" onclick="selectExercise(this, 300)">🏃 ジョギング30分<br><span style="color:#1D9E75;font-size:12px;">約300kcal</span></button>
      <button class="ex-btn" onclick="selectExercise(this, 200)">🚴 自転車30分<br><span style="color:#1D9E75;font-size:12px;">約200kcal</span></button>
      <button class="ex-btn" onclick="selectExercise(this, 250)">💪 筋トレ30分<br><span style="color:#1D9E75;font-size:12px;">約250kcal</span></button>
      <button class="ex-btn" onclick="selectExercise(this, 400)">🏊 水泳30分<br><span style="color:#1D9E75;font-size:12px;">約400kcal</span></button>
      <button class="ex-btn" onclick="selectExercise(this, 100)">🧘 ヨガ30分<br><span style="color:#1D9E75;font-size:12px;">約100kcal</span></button>
    </div>
    <div style="margin-top:auto;">
      <button class="btn-main" onclick="recordExercise()">記録する</button>
    </div>
  </div>
</div>

</div>

function calcBMR(gender, age, height, weight) {
  if (gender === 'female') {
    return Math.round(447.6 + (9.2 * weight) + (3.1 * height) - (4.3 * age));
  } else {
    return Math.round(88.4 + (13.4 * weight) + (4.8 * height) - (5.7 * age));
  }
}

function startApp() {
  const gender = document.getElementById('input-gender').value;
  const age = parseInt(document.getElementById('input-age').value);
  const height = parseFloat(document.getElementById('input-height').value);
  const weight = parseFloat(document.getElementById('input-weight').value);
  if (!age || !height || !weight) { alert('全て入力してください'); return; }
  state.bmr = calcBMR(gender, age, height, weight);
  state.targetCal = state.bmr - 240;
  state.weight = weight;
  document.getElementById('stat-weight').textContent = weight + 'kg';
  showScreen('home');
  updateDog();
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  if (name === 'food') {
    document.getElementById('upload-area').style.display = 'block';
    document.getElementById('analyzing').classList.remove('visible');
    document.getElementById('food-result').classList.remove('visible');
  }
}

function updateDog() {
  const balance = state.targetCal - state.calories + state.exerciseCal;
  let mood = 'happy';
  let message = '今日も一緒に頑張ろう！';
  let barColor = '#E8F5E9';
  let barTextColor = '#1D9E75';

  if (state.calories === 0) {
    mood = 'happy';
    message = '食事を記録してね！';
  } else if (balance >= 0 && balance <= 500) {
    mood = 'happy';
    message = 'いい調子！このペースで月1kg痩せるよ🎉';
    barColor = '#E8F5E9';
  } else if (balance > 500) {
    mood = 'sad';
    message = '食べなさすぎかも...クロが心配してるよ';
    barColor = '#FFF3E0';
    barTextColor = '#E65100';
  } else if (balance < -300) {
    mood = 'angry';
    message = '食べすぎだよ！クロが怒ってる😤';
    barColor = '#FFEBEE';
    barTextColor = '#C62828';
  } else {
    mood = 'tired';
    message = 'ちょっと多めかも...散歩してみて';
    barColor = '#FFF3E0';
    barTextColor = '#E65100';
  }

  const dogImg = document.getElementById('dog-img');
  dogImg.src = IMGS[mood];
  dogImg.classList.remove('bounce');
  void dogImg.offsetWidth;
  dogImg.classList.add('bounce');
  document.getElementById('dog-message').textContent = message;

  const bar = document.getElementById('balance-bar');
  bar.style.background = barColor;
  const balLabel = document.getElementById('balance-value');
  balLabel.style.color = barTextColor;

  if (state.calories > 0) {
    const diff = balance;
    if (diff >= 0) {
      balLabel.textContent = 'あと' + diff + 'kcal余裕あり ✅';
    } else {
      balLabel.textContent = Math.abs(diff) + 'kcalオーバー ⚠️';
    }
  } else {
    balLabel.textContent = '記録してみよう';
  }

  document.getElementById('stat-food').textContent = state.calories;
  document.getElementById('stat-steps').textContent = state.steps.toLocaleString();
}

async function analyzeFood(input) {
  const file = input.files[0];
  if (!file) return;

  document.getElementById('upload-area').style.display = 'none';
  document.getElementById('analyzing').classList.add('visible');
  document.getElementById('analyzing-dog').src = IMGS['happy'];

  const reader = new FileReader();
  reader.onload = async (e) => {
    const base64 = e.target.result.split(',')[1];
    const mediaType = file.type;

    try {
      const response = await fetch('/api/claude', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': APIKEY,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-haiku-4-5-20251001',
          max_tokens: 300,
          messages: [{
            role: 'user',
            content: [
              { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
              { type: 'text', text: 'この食事・食品の写真を分析してください。パッケージの栄養成分表示がある場合はそれを読み取り、ない場合は見た目から推定してください。価格や金額の数字は無視してください。必ず以下のJSON形式だけで返してください。余分な文字は不要です。\n{"name":"料理名","calories":カロリー整数,"protein":"タンパク質g数","fat":"脂質g数","carb":"炭水化物g数"}' }
            ]
          }]
        })
      });

      const data = await response.json();
      const text = data.content[0].text.trim();
const cleanText = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
const json = JSON.parse(cleanText);

      document.getElementById('analyzing').classList.remove('visible');
      document.getElementById('result-food-name').textContent = json.name;
      document.getElementById('result-cal').textContent = json.calories;
      document.getElementById('result-protein').textContent = json.protein;
      document.getElementById('result-fat').textContent = json.fat;
      document.getElementById('result-carb').textContent = json.carb;

      const isGood = json.calories < 500;
      document.getElementById('reaction-dog').src = IMGS[isGood ? 'happy' : 'sad'];
      document.getElementById('reaction-text').textContent = isGood
        ? 'ヘルシーだね！クロも嬉しそう🐾'
        : 'ちょっと多めだけど、記録できてえらい！';

      document.getElementById('food-result').classList.add('visible');
      window._pendingCal = json.calories;

  } catch(e) {
      document.getElementById('analyzing').classList.remove('visible');
      document.getElementById('upload-area').style.display = 'block';
      alert('エラー: ' + e.message);
      console.error('APIエラー詳細:', e);
    }
  };
  reader.readAsDataURL(file);
}

function recordFood() {
  if (!window._pendingCal) return;
  state.calories += window._pendingCal;
  window._pendingCal = null;
  showScreen('home');
  updateDog();
}

function recordWeight() {
  const w = parseFloat(document.getElementById('weight-input').value);
  if (!w) { alert('体重を入力してください'); return; }
  state.weight = w;
  document.getElementById('stat-weight').textContent = w + 'kg';
  showScreen('home');
  updateDog();
}

let selectedExerciseEl = null;
let selectedExerciseCal = 0;

function selectExercise(el, cal) {
  if (selectedExerciseEl) selectedExerciseEl.classList.remove('selected');
  el.classList.add('selected');
  selectedExerciseEl = el;
  selectedExerciseCal = cal;
}

function recordExercise() {
  if (!selectedExerciseCal) { alert('運動を選んでください'); return; }
  state.exerciseCal += selectedExerciseCal;
  selectedExerciseEl.classList.remove('selected');
  selectedExerciseEl = null;
  selectedExerciseCal = 0;
  showScreen('home');
  updateDog();
}

// Init dog images on home
document.getElementById('dog-img').src = IMGS['happy'];
document.getElementById('analyzing-dog').src = IMGS['happy'];
</script>
