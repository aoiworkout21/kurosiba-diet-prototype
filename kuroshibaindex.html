<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>黒柴ダイエット</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f0; display: flex; justify-content: center; }
.app { width: 100%; max-width: 390px; min-height: 100vh; background: white; display: flex; flex-direction: column; }

/* SCREENS */
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ONBOARDING */
.onboard { padding: 40px 24px; flex: 1; display: flex; flex-direction: column; gap: 20px; }
.onboard h1 { font-size: 28px; font-weight: 700; color: #1a1a1a; }
.onboard p { font-size: 16px; color: #666; line-height: 1.6; }
.input-group { display: flex; flex-direction: column; gap: 8px; }
.input-group label { font-size: 14px; font-weight: 500; color: #333; }
.input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
input[type="number"], select {
  width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0;
  border-radius: 12px; font-size: 16px; background: #fafafa;
  color: #1a1a1a; outline: none;
}
input[type="number"]:focus, select:focus { border-color: #1D9E75; }
.btn-main {
  background: #1D9E75; color: white; border: none;
  border-radius: 16px; padding: 16px; font-size: 17px;
  font-weight: 600; cursor: pointer; margin-top: auto;
}

/* HOME */
.home-header { padding: 20px 24px 0; display: flex; justify-content: space-between; align-items: center; }
.app-name { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.streak { background: #FFF3E0; border: 2px solid #E65100; padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; color: #E65100; }
.dog-area { display: flex; flex-direction: column; align-items: center; padding: 24px 24px 16px; }
.dog-img { width: 110px; height: 110px; object-fit: contain; animation: bounce 0.8s infinite; margin: 0 auto 12px; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-6px)} }
.dog-msg { font-size: 15px; color: #444; text-align: center; background: #f0faf6; border-radius: 12px; padding: 10px 16px; }

/* 目標カロリー */
.goal-section { margin: 0 16px 12px; background: #f0faf6; border-radius: 16px; padding: 16px; }
.goal-title { font-size: 13px; color: #555; margin-bottom: 6px; font-weight: 600; }
.goal-row { display: flex; align-items: flex-end; justify-content: space-between; }
.goal-cal { font-size: 32px; font-weight: 700; color: #1D9E75; }
.goal-max { font-size: 13px; color: #999; margin-bottom: 4px; }
.progress-bar-bg { width: 100%; height: 10px; background: #e0e0e0; border-radius: 8px; margin-top: 10px; overflow: hidden; }
.progress-bar-fill { height: 10px; border-radius: 8px; background: #1D9E75; transition: width 0.4s; }
.goal-remaining { font-size: 13px; color: #555; margin-top: 6px; text-align: right; }

/* 食事記録ボタン */
.meal-record-btn { margin: 0 16px 12px; background: #1D9E75; color: white; border: none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 600; cursor: pointer; width: calc(100% - 32px); }

/* 食事履歴 */
.history-section { margin: 0 16px; flex: 1; }
.history-title { font-size: 15px; font-weight: 700; color: #333; margin-bottom: 10px; }
.meal-group { margin-bottom: 14px; }
.meal-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.meal-badge { font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px; }
.meal-badge.朝 { background: #FFF3E0; color: #E65100; }
.meal-badge.昼 { background: #E3F2FD; color: #1565C0; }
.meal-badge.夜 { background: #EDE7F6; color: #4527A0; }
.meal-badge.間食 { background: #FCE4EC; color: #880E4F; }
.meal-group-cal { font-size: 13px; color: #888; margin-left: auto; }
.history-item { display: flex; justify-content: space-between; align-items: center; background: #fafafa; border-radius: 10px; padding: 10px 14px; margin-bottom: 6px; }
.history-item-name { font-size: 14px; color: #333; }
.history-item-right { display: flex; align-items: center; gap: 10px; }
.history-item-cal { font-size: 14px; font-weight: 600; color: #1D9E75; }
.history-item-del { background: none; border: none; color: #ccc; font-size: 16px; cursor: pointer; }
.no-history { text-align: center; color: #bbb; font-size: 14px; padding: 24px 0; }

/* STATS */
.stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 16px; }
.stat-card { background: #f5f5f0; border-radius: 14px; padding: 14px 16px; }
.stat-label { font-size: 12px; color: #888; margin-bottom: 4px; }
.stat-value { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.stat-unit { font-size: 13px; color: #888; }

/* FOOD INPUT SCREEN */
.food-screen { padding: 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 16px; }
.food-screen h2 { font-size: 20px; font-weight: 700; color: #1a1a1a; }
.meal-select-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
.meal-btn { padding: 10px 0; border-radius: 12px; border: 2px solid #e0e0e0; background: white; font-size: 14px; font-weight: 600; color: #999; cursor: pointer; text-align: center; }
.meal-btn.selected { border-color: #1D9E75; background: #f0faf6; color: #1D9E75; }
.food-input-group { display: flex; flex-direction: column; gap: 8px; }
.food-input-group label { font-size: 14px; font-weight: 500; color: #333; }
.food-input-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #e0e0e0; border-radius: 12px; font-size: 16px; background: #fafafa; color: #1a1a1a; outline: none; }
.food-input-group input:focus { border-color: #1D9E75; }
.ai-btn { background: #f0faf6; border: 1.5px solid #1D9E75; color: #1D9E75; border-radius: 12px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; }
.ai-result { background: #f0faf6; border-radius: 12px; padding: 14px; font-size: 14px; color: #333; display: none; }
.ai-result.visible { display: block; }

/* ANALYZING */
.analyzing { display: none; text-align: center; padding: 32px 24px; }
.analyzing.visible { display: block; }
.analyzing-dog { width: 80px; height: 80px; object-fit: contain; animation: bounce 0.8s infinite; margin: 0 auto 12px; }
.analyzing-text { font-size: 15px; color: #666; }

/* BOTTOM NAV */
.bottom-nav { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; border-top: 1px solid #f0f0f0; background: white; padding-bottom: env(safe-area-inset-bottom); }
.nav-btn { display: flex; flex-direction: column; align-items: center; padding: 10px; background: none; border: none; cursor: pointer; gap: 4px; }
.nav-icon { font-size: 24px; }
.nav-label { font-size: 10px; color: #999; font-weight: 500; }
.nav-btn.active .nav-label { color: #1D9E75; }
</style>
</head>
<body>
<div class="app">

  <!-- ONBOARDING -->
  <div class="screen active" id="screen-onboard">
    <div class="onboard">
      <h1>🐕 黒柴ダイエット</h1>
      <p>クロと一緒に、月1kgずつ痩せよう。</p>
      <div class="input-group">
        <label>性別</label>
        <select id="gender"><option value="female">女性</option><option value="male">男性</option></select>
      </div>
      <div class="input-row">
        <div class="input-group">
          <label>年齢</label>
          <input type="number" id="age" value="29" min="10" max="100">
        </div>
        <div class="input-group">
          <label>身長 (cm)</label>
          <input type="number" id="height" value="158" min="100" max="250">
        </div>
      </div>
      <div class="input-group">
        <label>体重 (kg)</label>
        <input type="number" id="weight" value="58" min="20" max="300">
      </div>
      <button class="btn-main" onclick="startApp()">クロとはじめる 🐾</button>
    </div>
  </div>

  <!-- HOME -->
  <div class="screen" id="screen-home">
    <div class="home-header">
      <span class="app-name">🐕 黒柴ダイエット</span>
      <span class="streak" id="streak-badge">🔥 0日連続</span>
    </div>
    <div class="dog-area">
      <img class="dog-img" id="dog-img" src="" alt="クロ">
      <div class="dog-msg" id="dog-msg">今日も一緒に頑張ろうワン！</div>
    </div>

    <!-- 目標カロリー -->
    <div class="goal-section">
      <div class="goal-title">🎯 今日のカロリー目標</div>
      <div class="goal-row">
        <div class="goal-cal"><span id="stat-food">0</span> <span style="font-size:16px;color:#999">kcal</span></div>
        <div class="goal-max">目標 <span id="stat-target">1200</span> kcal</div>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
      </div>
      <div class="goal-remaining" id="goal-remaining">あと 1200 kcal</div>
    </div>

    <!-- 食事記録ボタン -->
    <button class="meal-record-btn" onclick="showScreen('food-input')">＋ 食事を記録する</button>

    <!-- 食事履歴 -->
    <div class="history-section">
      <div class="history-title">📋 今日の食事</div>
      <div id="meal-history-list"><div class="no-history">まだ記録がないワン🐾</div></div>
    </div>
  </div>

  <!-- FOOD INPUT SCREEN -->
  <div class="screen" id="screen-food-input">
    <div class="food-screen">
      <h2>🍽 食事を記録</h2>

      <!-- 朝昼夜選択 -->
      <div>
        <div style="font-size:14px;font-weight:500;color:#333;margin-bottom:8px;">食事のタイミング</div>
        <div class="meal-select-row">
          <button class="meal-btn selected" id="meal-btn-朝" onclick="selectMeal('朝')">🌅 朝</button>
          <button class="meal-btn" id="meal-btn-昼" onclick="selectMeal('昼')">☀️ 昼</button>
          <button class="meal-btn" id="meal-btn-夜" onclick="selectMeal('夜')">🌙 夜</button>
          <button class="meal-btn" id="meal-btn-間食" onclick="selectMeal('間食')">🍡 間食</button>
        </div>
      </div>

      <!-- 手入力 -->
      <div class="food-input-group">
        <label>食品名</label>
        <input type="text" id="food-name-input" placeholder="例：ご飯（普通盛り）">
      </div>
      <div class="food-input-group">
        <label>カロリー (kcal)</label>
        <input type="number" id="food-cal-input" placeholder="例：250">
      </div>

      <!-- AI解析ボタン -->
      <button class="ai-btn" onclick="aiGuessCalories()">🤖 AI にカロリーを聞く</button>

      <div class="analyzing" id="analyzing-ai">
        <img class="analyzing-dog" id="analyzing-dog" src="" alt="">
        <div class="analyzing-text">クロが調べてるワン…🐾</div>
      </div>

      <div class="ai-result" id="ai-result-box"></div>

      <button class="btn-main" onclick="addFoodEntry()" style="margin-top:auto">記録する</button>
      <button onclick="showScreen('home')" style="background:none;border:none;color:#999;font-size:15px;cursor:pointer;padding:8px;">← もどる</button>
    </div>
  </div>

  <!-- STATS SCREEN -->
  <div class="screen" id="screen-stats">
    <div style="padding:24px;">
      <div style="font-size:20px;font-weight:700;margin-bottom:16px;">📊 記録</div>
      <div class="stat-cards">
        <div class="stat-card">
          <div class="stat-label">今日のカロリー</div>
          <div class="stat-value"><span id="stats-cal">0</span><span class="stat-unit">kcal</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">目標まで</div>
          <div class="stat-value"><span id="stats-remain">0</span><span class="stat-unit">kcal</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">体重</div>
          <div class="stat-value"><span id="stat-weight">--</span><span class="stat-unit">kg</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">連続記録</div>
          <div class="stat-value"><span id="stats-streak">0</span><span class="stat-unit">日</span></div>
        </div>
      </div>
      <div style="margin-top:20px;">
        <div style="font-size:15px;font-weight:700;margin-bottom:10px;">過去の食事履歴</div>
        <div id="past-history-list" style="font-size:14px;color:#666;"></div>
      </div>
    </div>
  </div>

  <!-- SETTINGS SCREEN -->
  <div class="screen" id="screen-settings">
    <div style="padding:24px;display:flex;flex-direction:column;gap:16px;">
      <div style="font-size:20px;font-weight:700;">⚙️ 設定</div>
      <div class="food-input-group">
        <label>目標カロリー (kcal/日)</label>
        <input type="number" id="goal-input" placeholder="例: 1400">
      </div>
      <div class="food-input-group">
        <label>体重を更新 (kg)</label>
        <input type="number" id="weight-input" placeholder="例: 57.5">
      </div>
      <button class="btn-main" onclick="saveSettings()">保存する</button>
      <button onclick="resetApp()" style="background:none;border:1.5px solid #e0e0e0;border-radius:12px;padding:12px;color:#999;font-size:14px;cursor:pointer;">最初からやり直す</button>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <button class="nav-btn active" id="nav-home" onclick="showScreen('home');setNav('home')">
      <span class="nav-icon">🏠</span><span class="nav-label">ホーム</span>
    </button>
    <button class="nav-btn" id="nav-food-input" onclick="showScreen('food-input');setNav('food-input')">
      <span class="nav-icon">➕</span><span class="nav-label">記録</span>
    </button>
    <button class="nav-btn" id="nav-stats" onclick="showScreen('stats');setNav('stats');renderPastHistory()">
      <span class="nav-icon">📊</span><span class="nav-label">履歴</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showScreen('settings');setNav('settings');loadSettings()">
      <span class="nav-icon">⚙️</span><span class="nav-label">設定</span>
    </button>
  </div>

</div>

<script>
const IMGS = {
  happy: 'https://em-content.zobj.net/source/apple/391/dog_1f415.png',
  sad:   'https://em-content.zobj.net/source/apple/391/dog-face_1f436.png',
};

const MSGS = {
  under50:  ['完璧ワン！🐾','今日もえらいワン！','クロも嬉しいワン😊'],
  under100: ['いい感じワン！','もう少しで達成ワン！🐾','頑張ってるワン！'],
  over:     ['食べすぎかもワン…😢','明日また頑張ろうワン！','ちょっと多めだったワン'],
  empty:    ['何か食べたワン？記録してワン！','今日の食事を教えてワン🐾'],
};

const state = {
  calories: 0,
  targetCal: 1200,
  weight: 58,
  bmr: 1400,
  streak: 0,
  selectedMeal: '朝',
  foodHistory: {},  // { "2026-03-15": [{meal, name, cal, id}] }
};

function todayKey() {
  return new Date().toISOString().slice(0, 10);
}

function startApp() {
  const gender = document.getElementById('gender').value;
  const age = +document.getElementById('age').value;
  const height = +document.getElementById('height').value;
  const weight = +document.getElementById('weight').value;
  state.bmr = calcBMR(gender, age, height, weight);
  state.targetCal = state.bmr - 240;
  state.weight = weight;
  const profile = { gender, age, height, weight };
  localStorage.setItem('userProfile', JSON.stringify(profile));
  loadTodayHistory();
  showScreen('home');
  updateHome();
}

function calcBMR(gender, age, height, weight) {
  if (gender === 'female') return Math.round(655 + 9.6 * weight + 1.8 * height - 4.7 * age);
  return Math.round(66 + 13.7 * weight + 5 * height - 6.8 * age);
}

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function setNav(name) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('nav-' + name);
  if (btn) btn.classList.add('active');
}

function selectMeal(meal) {
  state.selectedMeal = meal;
  ['朝','昼','夜','間食'].forEach(m => {
    document.getElementById('meal-btn-' + m).classList.toggle('selected', m === meal);
  });
}

function aiGuessCalories() {
  const name = document.getElementById('food-name-input').value.trim();
  if (!name) { alert('食品名を入力してワン！'); return; }
  document.getElementById('analyzing-ai').classList.add('visible');
  document.getElementById('ai-result-box').classList.remove('visible');
  document.getElementById('analyzing-dog').src = IMGS.happy;

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 200,
      system: '食べ物のカロリーをJSON形式だけで返してください。形式: {"name":"食品名","calories":数値,"unit":"単位"}。説明不要。JSONのみ。',
      messages: [{ role: 'user', content: name }]
    })
  })
  .then(r => r.json())
  .then(data => {
    document.getElementById('analyzing-ai').classList.remove('visible');
    const text = (data.content || []).map(c => c.text || '').join('');
    const clean = text.replace(/```json|```/g, '').trim();
    const json = JSON.parse(clean);
    document.getElementById('food-name-input').value = json.name;
    document.getElementById('food-cal-input').value = json.calories;
    const box = document.getElementById('ai-result-box');
    box.innerHTML = `🤖 <b>${json.name}</b>（${json.unit}）≈ <b>${json.calories} kcal</b>`;
    box.classList.add('visible');
  })
  .catch(e => {
    document.getElementById('analyzing-ai').classList.remove('visible');
    alert('AI取得失敗。手入力してワン！');
  });
}

function addFoodEntry() {
  const name = document.getElementById('food-name-input').value.trim();
  const cal = parseInt(document.getElementById('food-cal-input').value);
  if (!name || isNaN(cal) || cal <= 0) { alert('食品名とカロリーを入力してワン！'); return; }

  const today = todayKey();
  if (!state.foodHistory[today]) state.foodHistory[today] = [];
  state.foodHistory[today].push({ id: Date.now(), meal: state.selectedMeal, name, cal });
  saveFoodHistory();

  state.calories = state.foodHistory[today].reduce((s, e) => s + e.cal, 0);
  document.getElementById('food-name-input').value = '';
  document.getElementById('food-cal-input').value = '';
  document.getElementById('ai-result-box').classList.remove('visible');

  updateHome();
  showScreen('home');
  setNav('home');
}

function deleteFoodEntry(id) {
  const today = todayKey();
  state.foodHistory[today] = (state.foodHistory[today] || []).filter(e => e.id !== id);
  saveFoodHistory();
  state.calories = (state.foodHistory[today] || []).reduce((s, e) => s + e.cal, 0);
  updateHome();
}

function saveFoodHistory() {
  localStorage.setItem('foodHistory', JSON.stringify(state.foodHistory));
}

function loadTodayHistory() {
  const saved = localStorage.getItem('foodHistory');
  if (saved) state.foodHistory = JSON.parse(saved);
  const today = todayKey();
  state.calories = (state.foodHistory[today] || []).reduce((s, e) => s + e.cal, 0);
}

function updateHome() {
  document.getElementById('dog-img').src = IMGS.happy;
  const cal = state.calories;
  const target = state.targetCal;
  const pct = Math.min(100, Math.round(cal / target * 100));
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  fill.style.background = cal > target ? '#e53935' : cal > target * 0.8 ? '#FF9800' : '#1D9E75';

  document.getElementById('stat-food').textContent = cal;
  document.getElementById('stat-target').textContent = target;
  document.getElementById('stat-weight').textContent = state.weight + 'kg';
  document.getElementById('stats-cal').textContent = cal;
  document.getElementById('stats-remain').textContent = Math.max(0, target - cal);
  document.getElementById('stats-streak').textContent = state.streak;

  const remain = target - cal;
  const remEl = document.getElementById('goal-remaining');
  if (remain >= 0) {
    remEl.textContent = 'あと ' + remain + ' kcal';
    remEl.style.color = '#555';
  } else {
    remEl.textContent = Math.abs(remain) + ' kcal オーバー ⚠️';
    remEl.style.color = '#e53935';
  }

  // メッセージ
  let msg;
  if (cal === 0) msg = MSGS.empty[Math.floor(Math.random() * MSGS.empty.length)];
  else if (cal <= target) msg = MSGS.under50[Math.floor(Math.random() * MSGS.under50.length)];
  else msg = MSGS.over[Math.floor(Math.random() * MSGS.over.length)];
  document.getElementById('dog-msg').textContent = msg;

  renderMealHistory();
}

function renderMealHistory() {
  const today = todayKey();
  const entries = state.foodHistory[today] || [];
  const container = document.getElementById('meal-history-list');

  if (entries.length === 0) {
    container.innerHTML = '<div class="no-history">まだ記録がないワン🐾</div>';
    return;
  }

  const meals = ['朝','昼','夜','間食'];
  let html = '';
  meals.forEach(meal => {
    const items = entries.filter(e => e.meal === meal);
    if (items.length === 0) return;
    const mealTotal = items.reduce((s, e) => s + e.cal, 0);
    html += `<div class="meal-group">
      <div class="meal-group-header">
        <span class="meal-badge ${meal}">${meal}</span>
        <span class="meal-group-cal">${mealTotal} kcal</span>
      </div>`;
    items.forEach(e => {
      html += `<div class="history-item">
        <span class="history-item-name">${e.name}</span>
        <div class="history-item-right">
          <span class="history-item-cal">${e.cal} kcal</span>
          <button class="history-item-del" onclick="deleteFoodEntry(${e.id})">✕</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  container.innerHTML = html;
}

function renderPastHistory() {
  const keys = Object.keys(state.foodHistory).sort().reverse();
  const container = document.getElementById('past-history-list');
  if (keys.length === 0) { container.innerHTML = '<div style="color:#bbb;text-align:center;padding:20px;">履歴がないワン🐾</div>'; return; }
  let html = '';
  keys.forEach(date => {
    const entries = state.foodHistory[date] || [];
    const total = entries.reduce((s, e) => s + e.cal, 0);
    const ok = total <= state.targetCal;
    html += `<div style="display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0;">
      <span>${date}</span>
      <span style="font-weight:600;color:${ok ? '#1D9E75' : '#e53935'}">${total} kcal ${ok ? '✅' : '⚠️'}</span>
    </div>`;
  });
  container.innerHTML = html;
}

function saveSettings() {
  const goal = parseInt(document.getElementById('goal-input').value);
  const weight = parseFloat(document.getElementById('weight-input').value);
  if (!isNaN(goal) && goal > 0) { state.targetCal = goal; localStorage.setItem('targetCal', goal); }
  if (!isNaN(weight) && weight > 0) { state.weight = weight; localStorage.setItem('weight', weight); }
  updateHome();
  alert('保存したワン！🐾');
}

function loadSettings() {
  document.getElementById('goal-input').value = state.targetCal;
  document.getElementById('weight-input').value = state.weight;
}

function resetApp() {
  if (confirm('最初からやり直すワン？（データが全部消えるワン）')) {
    localStorage.clear();
    location.reload();
  }
}

// Init
document.getElementById('dog-img').src = IMGS.happy;
document.getElementById('analyzing-dog').src = IMGS.happy;

const savedProfile = localStorage.getItem('userProfile');
if (savedProfile) {
  const p = JSON.parse(savedProfile);
  state.bmr = calcBMR(p.gender, p.age, p.height, p.weight);
  state.targetCal = parseInt(localStorage.getItem('targetCal')) || state.bmr - 240;
  state.weight = parseFloat(localStorage.getItem('weight')) || p.weight;
  document.getElementById('streak-badge').textContent = '🔥 ' + state.streak + '日連続';
  loadTodayHistory();
  showScreen('home');
  updateHome();
}
</script>
</body>
</html>
